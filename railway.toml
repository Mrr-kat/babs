<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Ferreteria{% endblock %} - Sistema Inteligente</title>
  <link rel="stylesheet" href="/static/css/main.css">
  {% block head %}{% endblock %}
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="brand">
      <div class="brand-icon">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 11-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 004.486-6.336l-3.276 3.277a3.004 3.004 0 01-2.25-2.25l3.276-3.276a4.5 4.5 0 00-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437l1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008z"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Ferreteria</div>
        <div class="brand-sub">Panel Admin</div>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-label">Tienda</div>
      <a href="/" class="nav-item">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
        Carrito de Compras
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">Principal</div>
      <a href="/dashboard" class="nav-item {% if request.path == '/dashboard' %}active{% endif %}">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Panel General
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">Gestion</div>
      <a href="/inventario" class="nav-item {% if request.path == '/inventario' %}active{% endif %}">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
        Inventario
      </a>
      <a href="/ventas" class="nav-item {% if request.path == '/ventas' %}active{% endif %}">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
        </svg>
        Ventas
      </a>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">Inteligencia</div>
      <a href="/analytics" class="nav-item {% if request.path == '/analytics' %}active{% endif %}">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        Analitica
      </a>
      <a href="/alertas" class="nav-item {% if request.path == '/alertas' %}active{% endif %}" id="nav-alertas">
        <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
        Alertas
        <span class="nav-badge" id="alert-count" style="display:none">0</span>
      </a>
    </div>
  </nav>

  <div class="sidebar-footer">
    <button class="btn btn-secondary" style="width:100%;justify-content:center;gap:8px" onclick="doLogout()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      Cerrar Sesion
    </button>
    <div class="version" style="margin-top:8px">v1.0.0 — Admin</div>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="btn btn-secondary btn-icon" id="sidebar-toggle" style="display:none">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <span class="topbar-title">{% block page_title %}Panel General{% endblock %}</span>
    </div>
    <div class="topbar-right">
      <span style="font-size:0.75rem;color:var(--text-3);background:var(--bg-3);border:1px solid var(--border);padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="var(--green)"><circle cx="5" cy="5" r="5"/></svg>
        Administrador
      </span>
      <span style="font-size:0.8rem;color:var(--text-3)" id="topbar-date"></span>
    </div>
  </header>

  <div class="page-content">
    {% block content %}{% endblock %}
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  const d = new Date();
  document.getElementById('topbar-date').textContent = d.toLocaleDateString('es-CO', {weekday:'long',day:'numeric',month:'long'});

  fetch('/api/alertas').then(r=>r.json()).then(data=>{
    const c = data.resumen?.criticos || 0;
    const el = document.getElementById('alert-count');
    if(c > 0){ el.textContent = c; el.style.display = ''; }
  }).catch(()=>{});

  async function doLogout(){
    await fetch('/api/auth/logout', {method:'POST'});
    window.location.href = '/';
  }

  function showToast(msg, type='info'){
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">${
      type==='success' ? '<path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>' :
      type==='error' ? '<path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>' :
      '<path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>'
    }</svg><span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 3500);
  }

  function fmt(n){ return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0); }
  function fmtNum(n){ return new Intl.NumberFormat('es-CO').format(n||0); }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
